<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrum Dashboard Académico</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container header-content">
            <div class="logo-area">
                <h1>📊 SCRUM ACADÉMICO</h1>
                <span class="subtitle">Panel de Control &mdash; Creado por <a href="https://israeltorresindustrial.github.io/Israel-Torres-Web/#inicio" target="_blank" rel="noopener noreferrer" class="firma-link">ISRAEL TORRES</a></span>
            </div>
            <div class="filtros">
                <div class="filtro-grupo">
                    <label for="filtro-docente">Docente:</label>
                    <select id="filtro-docente">
                        <option value="" disabled selected>Cargando docentes...</option>
                    </select>
                </div>
                <div class="filtro-grupo">
                    <label for="filtro-seccion">Sección:</label>
                    <select id="filtro-seccion" disabled>
                        <option value="Todas">Seleccione docente primero</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="kpi-panel">
            <div class="kpi-card">
                <h3>Total Grupos</h3>
                <p id="kpi-total">0</p>
            </div>
            <div class="kpi-card kpi-aldia">
                <h3>Al Día</h3>
                <p id="kpi-aldia">0</p>
            </div>
            <div class="kpi-card kpi-seguimiento">
                <h3>En Seguimiento</h3>
                <p id="kpi-seguimiento">0</p>
            </div>
            <div class="kpi-card kpi-critico">
                <h3>Críticos</h3>
                <p id="kpi-criticos">0</p>
            </div>
        </section>

        <div id="loader" class="loader">
            <p>🔄 Conectando con el Motor Scrum...</p>
        </div>

        <div id="mensaje-inicio" class="loader hidden">
            <p>👆 Por favor, seleccione un docente para visualizar los grupos.</p>
        </div>

        <section id="dashboard-grid" class="grid hidden">
            </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
