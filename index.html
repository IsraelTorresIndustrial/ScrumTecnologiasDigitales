<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrum Dashboard - Tecnologías Digitales</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container header-content">
            <h1>📊 Scrum Dashboard Académico</h1>
            <div class="filtros">
                <label for="filtro-seccion">Sección:</label>
                <select id="filtro-seccion">
                    <option value="Todas">Todas las secciones</option>
                    </select>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="kpi-panel">
            <div class="kpi-card">
                <h3>Total Grupos</h3>
                <p id="kpi-total">0</p>
            </div>
            <div class="kpi-card kpi-critico">
                <h3>Grupos Críticos</h3>
                <p id="kpi-criticos">0</p>
            </div>
        </section>

        <div id="loader" class="loader">
            <p>🔄 Conectando con la base de datos de Google Sheets...</p>
        </div>

        <section id="dashboard-grid" class="grid">
            </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
